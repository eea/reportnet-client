      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

an\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;my_data.csv\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Eseparator\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;|\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"c1\"\u003E# or with pandas:\u003C/span\u003E\n\u003Cspan class=\"c1\"\u003E# import pandas as pd\u003C/span\u003E\n\u003Cspan class=\"c1\"\u003E# df = pd.read_csv(\u0026quot;my_data.csv\u0026quot;, sep=\u0026quot;|\u0026quot;)\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Ch3 id=\"option-c-build-rows-in-python\"\u003EOption C \u2014 build rows in Python\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EUse the empty template below as a starting point.\nLINK / CODELIST columns show their allowed values as Enum categories.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "22f3a1c7c2b4cc5ffd9bbbe122082876", "console": [], "id": "Hstk", "outputs": [{"ename": "ancestor-stopped", "evalue": "This cell wasn't run because an ancestor was stopped with `mo.stop`: ", "traceback": [], "type": "error"}]}, {"code_hash": "14eb8b51c057180e3d60da4af1841530", "console": [], "id": "nWHF", "outputs": [{"ename": "ancestor-stopped", "evalue": "This cell wasn't run because an ancestor was stopped with `mo.stop`: ", "traceback": [], "type": "error"}]}, {"code_hash": "ba52994e9558b48c0276388b983b52e9", "console": [], "id": "iLit", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"4-validate-before-uploading\"\u003E4. Validate before uploading\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003Evalidate_frame()\u003C/code\u003E checks required columns and Enum values.\nEnum columns already enforce valid values at assignment time \u2014 this\ncatches any remaining issues (e.g. missing required
